<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FREE STARGET</title>

<link rel="icon" type="image/png" href="https://i.ibb.co/YTWjH6Rh/MAGIE.png">

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<style>
  body {
    font-family: "Comic Sans MS";
    background: linear-gradient(135deg, #e4ecff, #ffffff);
    text-align: center;
    margin: 0;
    padding: 0;
  }

  h1 {
    color: #3248a8;
    text-shadow: 1px 1px 2px #ccc;
    margin-top: 40px;
  }

  input {
    padding: 10px;
    font-size: 16px;
    border-radius: 8px;
    border: 1px solid #ccc;
    margin: 5px;
    width: 200px;
  }

  button {
    padding: 10px 20px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    background-color: #4b61ff;
    color: white;
    cursor: pointer;
    margin: 5px;
  }

  button:hover {
    background-color: #3248a8;
  }

  #meetingContainer {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 20px;
  }

  #videos {
    flex: 2;
  }

  video {
    width: 45%;
    border-radius: 12px;
    margin: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  }

  #chat {
    flex: 1;
    background: white;
    border-radius: 12px;
    padding: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
    height: 300px;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    text-align: left;
    padding: 5px;
    font-size: 14px;
  }

  #chatInput {
    width: 90%;
  }
</style>
</head>

<body>

<h1>☪ FREE STARGET</h1>
<p>Make a call or join one with a code.</p>

<button id="createBtn">Make a Call</button><br>

<input id="joinCode" placeholder="Enter code">
<button id="joinBtn">Join Call</button>

<div id="meeting" style="display:none;">
  <h2 id="roomTitle"></h2>

  <div id="meetingContainer">

    <div id="videos">
      <video id="localVideo" autoplay muted></video>
      <video id="remoteVideo" autoplay></video>
    </div>

    <div id="chat">
      <div id="messages"></div>

      <div>
        <input id="chatInput" placeholder="Type message">
        <button id="sendBtn">Send</button>
      </div>
    </div>

  </div>
</div>

<script>

let localStream;
let peer;
let call;
let conn;

async function startCamera() {

  localStream = await navigator.mediaDevices.getUserMedia({
    video: true,
    audio: true
  });

  document.getElementById("localVideo").srcObject = localStream;
}

function showMeetingUI(code) {

  document.querySelector("h1").style.display = "none";
  document.querySelector("p").style.display = "none";

  document.getElementById("createBtn").style.display = "none";
  document.getElementById("joinCode").style.display = "none";
  document.getElementById("joinBtn").style.display = "none";

  document.getElementById("meeting").style.display = "block";

  document.getElementById("roomTitle").innerText =
    "Call Code: " + code;
}

function addMessage(text, sender) {

  const div = document.createElement("div");

  div.textContent =
    sender + ": " + text;

  document.getElementById("messages")
    .appendChild(div);
}

function setupChat(connection) {

  conn = connection;

  conn.on("data", data => {

    addMessage(data, "Them");

  });

}

document.getElementById("sendBtn").onclick = () => {

  const input =
    document.getElementById("chatInput");

  const msg =
    input.value;

  if (!msg) return;

  addMessage(msg, "You");

  if (conn) conn.send(msg);

  input.value = "";

};

document.getElementById("chatInput")
  .addEventListener("keypress", e => {

    if (e.key === "Enter") {

      document.getElementById("sendBtn").click();

    }

  });

document.getElementById("createBtn").onclick = async () => {

  const code =
    Math.random()
    .toString(36)
    .substring(2, 8)
    .toUpperCase();

  showMeetingUI(code);

  await startCamera();

  peer =
    new Peer(code);

  peer.on("call", incoming => {

    incoming.answer(localStream);

    incoming.on("stream", remoteStream => {

      document.getElementById("remoteVideo")
        .srcObject = remoteStream;

    });

  });

  peer.on("connection", connection => {

    setupChat(connection);

  });

  peer.on("open", () => {

    alert("Your Call Code is " + code);

  });

};

document.getElementById("joinBtn").onclick = async () => {

  const code =
    document.getElementById("joinCode")
    .value.trim()
    .toUpperCase();

  if (!code)
    return alert("Enter a valid call code.");

  showMeetingUI(code);

  await startCamera();

  peer =
    new Peer();

  peer.on("open", id => {

    call =
      peer.call(code, localStream);

    call.on("stream", remoteStream => {

      document.getElementById("remoteVideo")
        .srcObject = remoteStream;

    });

    const connection =
      peer.connect(code);

    setupChat(connection);

  });

};

</script>

</body>
</html>
